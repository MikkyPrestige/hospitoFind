<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HospitoFind - Find Hospitals & Healthcare Services Near You</title>
    <meta
      name="description"
      content="HospitoFind helps you quickly find verified hospitals, clinics, doctors, and healthcare services near you. Search by location, specialty, or emergency needs."
    />
    <meta name="author" content="HospitoFind" />

    <meta
      property="og:title"
      content="HospitoFind - Find Hospitals & Healthcare Services Near You"
    />
    <meta
      property="og:description"
      content="Instantly locate verified hospitals, clinics, doctors, and healthcare services near you. Fast, reliable global healthcare directory."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hospitofind.online" />
    <meta property="og:site_name" content="HospitoFind" />

    <meta
      property="og:image"
      content="https://hospitofind.online/og-default.jpg"
    />
    <meta
      property="og:image:secure_url"
      content="https://hospitofind.online/og-default.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="HospitoFind - Find Trusted Hospitals Worldwide"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="HospitoFind - Find Hospitals & Healthcare Services Near You"
    />
    <meta
      name="twitter:description"
      content="Instantly locate verified hospitals, clinics, doctors, and healthcare services near you."
    />
    <meta
      name="twitter:image"
      content="https://hospitofind.online/og-default.png"
    />

    <!-- App Meta Tags -->
    <meta name="apple-mobile-web-app-title" content="HospitoFind" />
    <meta name="application-name" content="HospitoFind" />
    <meta name="msapplication-TileColor" content="#2d89ef" />
    <meta name="theme-color" content="#f8faff" />

    <!-- Favicon & Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#5bbad5" />

    <script>
      ;(function () {
        try {
          const localTheme = localStorage.getItem('theme')
          const systemTheme = window.matchMedia(
            '(prefers-color-scheme: dark)'
          ).matches
          const metaThemeColor = document.querySelector(
            'meta[name="theme-color"]'
          )

          const darkBg = '#020617'
          const lightBg = '#f8faff'

          if (localTheme === 'dark' || (!localTheme && systemTheme)) {
            document.documentElement.setAttribute('data-theme', 'dark')
            if (metaThemeColor) metaThemeColor.setAttribute('content', darkBg)
          } else {
            document.documentElement.setAttribute('data-theme', 'light')
            if (metaThemeColor) metaThemeColor.setAttribute('content', lightBg)
          }
        } catch (e) {
          console.error('Theme script failed', e)
        }
      })()
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      async
      src="https://scripts.simpleanalyticscdn.com/latest.js"
    ></script>
  </body>
</html>
